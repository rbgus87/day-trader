# ============================================================================
# config.yaml — 단타 자동매매 시스템 설정
# ============================================================================
# 민감 정보(API키, 계좌번호 등)는 .env 파일에서 관리합니다.
# 이 파일은 git에 커밋되므로 비밀번호/토큰을 절대 포함하지 마세요.

# --- 모드 ---
paper_mode: true                    # true=주문 시뮬레이션(페이퍼), false=실매매(라이브)

# --- 매매 기본 설정 ---
trading:
  initial_capital: 1_000_000       # 초기 자본금 (원)

  # 리스크
  stop_loss_pct: -0.015             # 손절률 -1.5%
  daily_max_loss_pct: -0.02         # 일일 최대 손실 -2% → 매매 중단
  consecutive_loss_days: 3          # N일 연속 손실 시 포지션 축소
  reduced_position_pct: 0.5         # 연속 손실 시 포지션 50%로 축소

  # 익절
  tp1_pct: 0.03                     # 1차 익절 +3% (최적화 결과: 2%→3%)
  tp1_sell_ratio: 0.5               # 1차 익절 시 50% 매도
  trailing_stop_pct: 0.01           # 고점 대비 -1% 트레일링 스톱

  # 진입
  entry_1st_ratio: 0.55             # 1차 매수 비율 55% (나머지 2차 매수)
  max_trades_per_day: 3             # 일일 최대 거래 횟수 (최적화 결과: 5→3)
  cooldown_minutes: 15              # 청산 후 재진입 대기 (최적화 결과: 10→15분)

  # 시간
  signal_block_until: "09:05"       # 09:05 이전 신호 차단 (장 초반 변동성 회피)
  force_close_time: "15:10"         # 15:10 미청산 포지션 강제 청산
  screening_time: "08:30"           # 08:30 장 전 스크리닝
  report_time: "15:30"              # 15:30 일일 보고서 텔레그램 발송

# --- 전략 파라미터 ---
strategy:
  # DEPRECATED: ORB — 백테스트 4종목 전부 PF<1.0 (2026-03-30 폐기)
  # orb:
  #   range_start: "09:05"
  #   range_end: "09:15"
  #   volume_ratio: 0.0
  #   stop_loss_pct: -0.015
  #   min_range_pct: 0.008

  # DEPRECATED: VWAP — 백테스트 4종목 전부 PF<1.0 (2026-03-30 폐기)
  # vwap:
  #   rsi_low: 40.0
  #   rsi_high: 60.0
  #   stop_loss_pct: -0.012

  # 모멘텀 브레이크아웃 — 전일 고점 돌파 + 거래량 200%
  momentum:
    volume_ratio: 2.0               # 전일 대비 거래량 200%
    stop_loss_pct: -0.008           # 손절 -0.8%
    # vwap_filter: false            # 4회 실험 결과 개선 효과 없음
    # retest_band_pct: 0.008        # 향후 틱 백테스터에서 재검증용
    # retest_timeout_minutes: 45

  # 눌림목 — 당일 상승 종목의 조정 후 반등
  pullback:
    min_gain_pct: 0.04              # 당일 +4% 이상
    stop_loss_pct: -0.018           # 손절 -1.8%
    # v2 파라미터 (롤백: 조건 완화 실험 결과 PF 악화)
    # ma_short: 10
    # ma_long: 10
    # ma_touch_band: 0.01
    # min_atr_pct: 0.025

  # 수급추종 (FlowStrategy) — 거래량 급증 기반 Phase 1
  flow:
    volume_surge_ratio: 2.5         # 5분 거래량 / 20분 평균
    stop_loss_pct: -0.015           # 손절 -1.5%
    trailing_stop_pct: 0.015        # 트레일링 -1.5% (넓게)
    vwap_filter: true               # VWAP 방향 필터
    signal_start: "09:30"           # 신호 활성 시작
    signal_end: "14:30"             # 신호 활성 종료

  # 갭 앤 고 (GapStrategy) — 갭업 후 첫 양봉 매수
  gap:
    min_gap_pct: 0.015                # 최소 갭 1.5%
    stop_loss_pct: -0.01              # 시가 기준 -1%

  # 시가 돌파 (OpenBreakStrategy) — 시가 +0.5% 돌파 + 거래량
  open_break:
    break_pct: 0.005                  # 시가 +0.5% 돌파
    volume_ratio: 0.3                 # 전일 대비 30% (시간대 보정)
    stop_loss_pct: -0.005             # 시가 -0.5%
    signal_start: "09:15"             # 장 초반 10분 노이즈 회피

  # 세력 캔들 (BigCandleStrategy) — 큰 양봉 후 되돌림 반등
  big_candle:
    atr_multiplier: 1.5               # ATR 대비 캔들 크기
    timeout_minutes: 30               # 되돌림 대기 타임아웃
    stop_loss_pct: -0.01              # 세력 캔들 저가 기준 -1%

  # 전략 선택기 임계값 (StrategySelector)
  # 3전략 체제: Momentum > Flow > Pullback
  selector:
    momentum_etf_threshold: 2.0     # 섹터 ETF 등락 ≥ 2.0% → 모멘텀 전략

# --- 스크리닝 필터 ---
# 코스닥 중대형 포함을 위해 시가총액 하한 완화, ATR 하한 상향
screener:
  min_market_cap: 200_000_000_000   # 시가총액 2,000억원 이상 (코스닥 대형 포함)
  min_avg_volume_amount: 10_000_000_000 # 일평균 거래대금 100억원 이상 (유동성 강화)
  volume_surge_ratio: 1.5           # 전일 거래량 +50% 이상
  min_atr_pct: 0.03                 # ATR(14) / 종가 3% 이상 (변동성 하한 상향)

# --- 브로커 연결 (키움 REST API) ---
broker:
  base_url: "https://api.kiwoom.com"
  ws_url: "wss://api.kiwoom.com:10000/api/dostk/websocket"
  rate_limit_calls: 5               # 초당 최대 API 호출 수
  rate_limit_period: 1.0            # Rate Limit 윈도우 (초)

# --- 백테스트 비용 모델 ---
backtest:
  commission: 0.00015               # 수수료 0.015% (매수/매도 각각)
  tax: 0.0018                       # 거래세 0.18% (매도 시에만)
  slippage: 0.0003                  # 슬리피지 0.03% (대형주 현실적 수준)
  initial_capital: 1_000_000        # 백테스트 초기 자본금

# --- 스케줄러 ---
schedule:
  screening_time: "08:30"           # 장전 스크리닝
  ws_connect_time: "08:50"          # WebSocket 연결
  force_close_time: "15:10"         # 강제 청산
  daily_report_time: "15:30"        # 일일 보고서
