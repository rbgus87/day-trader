# ============================================================================
# config.yaml — 단타 자동매매 시스템 설정
# ============================================================================
# 민감 정보(API키, 계좌번호 등)는 .env 파일에서 관리합니다.
# 이 파일은 git에 커밋되므로 비밀번호/토큰을 절대 포함하지 마세요.
# 최신 baseline 및 동작 상세: docs/spec/backtester_behavior.md 참조.

# --- 모드 ---
paper_mode: true                    # true=주문 시뮬레이션(페이퍼), false=실매매(라이브)

# --- 매매 기본 설정 ---
trading:
  initial_capital: 3_000_000       # 페이퍼 자본 (시뮬 결과: 수익률 86.5%, PF 3.24)

  # 리스크
  daily_max_loss_pct: -0.015        # Phase 3 Day 11.5: -2% → -1.5% 강화
  consecutive_loss_days: 3          # N일 연속 손실 시 포지션 축소
  reduced_position_pct: 0.5         # 연속 손실 시 포지션 50%로 축소

  # Phase 2 Day 10: 약세장 방어
  daily_max_loss_enabled: true
  blacklist_enabled: true
  blacklist_lookback_days: 5        # 최근 5일 집계
  blacklist_loss_threshold: 3       # 5일 내 3회 이상 손실 시 블랙
  blacklist_days: 7                 # 7일간 매매 제외

  # Phase 3 Day 11.5: 방어 레벨 A — 연속 손실 휴식
  consecutive_loss_rest_enabled: true
  consecutive_loss_threshold: 3     # 3일 연속 손실 시
  consecutive_loss_rest_days: 1     # 1일 휴식

  # 진입 (멀티 종목 모델)
  entry_1st_ratio: 1.0              # 100% 1차 매수 (2차 매수 미구현, ADR-010)
  max_trades_per_day: 2             # 종목당 1회
  max_positions: 3                  # 동시 포지션 최대 3개
  screening_top_n: 5                # dead: UI 알림 범위 제한용, 진입 게이팅에 영향 X
  cooldown_minutes: 120             # 사실상 재진입 금지

  # 시간
  signal_block_until: "09:05"       # 09:05 이전 신호 차단 (장 초반 변동성 회피)
  force_close_time: "15:10"         # 15:10 미청산 포지션 강제 청산
  screening_time: "08:30"           # 08:30 장 전 스크리닝
  report_time: "15:30"              # 15:30 일일 보고서 텔레그램 발송

  # 시장 필터 (Phase 1 Day 3) — 코스피/코스닥 지수 MA 기반 매수 차단
  market_filter_enabled: true       # true면 약세 시장 종목 매수 차단
  market_ma_length: 5               # MA 기간 (일)

# --- 전략 파라미터 ---
strategy:
  force: "momentum"                     # 비어있으면 selector 로직, 값 있으면 해당 전략 강제

  # 모멘텀 브레이크아웃 — 전일 고점 돌파 + 거래량 200%
  momentum:
    volume_ratio: 2.0               # 전일 대비 거래량 200%
    min_breakout_pct: 0.03          # ADR-016: 전일 고가 대비 최소 돌파폭 3% (미세 돌파 노이즈 제거)
    adx_enabled: true               # ADX 추세 필터
    adx_length: 14                  # ADX 계산 기간
    adx_min: 20                     # ADX 최소값
    rvol_enabled: false
    rvol_window: 5
    rvol_min: 3.0
    vwap_enabled: false
    vwap_min_above: 0.0

    # 오전 매수 제한 (오후 진입 차단)
    buy_time_limit_enabled: true
    buy_time_end: "12:00"

    # ADR-010: 고정 -8% 손절 (이전 ATR max와 동일, 41종목 전부 클램핑이었으므로 동작 동일)
    atr_stop_enabled: false
    stop_loss_pct: -0.080

    # ADR-010: TP1 시스템 폐기 (Pure trailing 채택)
    # TP1 분할매도 비활성 — 진입 즉시 trailing 활성
    atr_tp_enabled: false

    # ADR-010: Chandelier 트레일링 스톱 (진입 즉시 활성)
    atr_trail_enabled: true         # 최고가 - ATR × N 방식
    atr_trail_multiplier: 1.0       # ADR-010: 2.5 → 1.0 (시뮬 최적)
    atr_trail_min_pct: 0.02         # 하한 2%
    atr_trail_max_pct: 0.10         # 상한 10%

    # ADR-017: Breakeven Stop (BE3) — peak_return 3% 도달 시 stop을 진입가+1%로
    breakeven_enabled: true         # 활성화
    breakeven_trigger_pct: 0.03     # +3% 도달 시 발동
    breakeven_offset_pct: 0.01      # stop을 진입가+1%로 상향

    # 상한가 즉시 청산 — current_price >= 상한가 도달 시 즉시 매도
    limit_up_exit_enabled: true     # 활성화
    limit_up_pct: 0.30              # 전일종가 × 1.30 (호가 절사)
    limit_up_stop_floor_pct: 0.99   # 매도 실패 시 stop = 상한가 × 0.99 상향

  # 전략 선택기 임계값 (StrategySelector — 현재 항상 momentum)
  selector:
    momentum_etf_threshold: 2.0     # 섹터 ETF 등락 ≥ 2.0% → 모멘텀 전략

# --- 스크리닝 필터 ---
screener:
  min_market_cap: 200_000_000_000   # 시가총액 2,000억원 이상 (코스닥 대형 포함)
  min_avg_volume_amount: 10_000_000_000 # 일평균 거래대금 100억원 이상 (유동성 강화)
  volume_surge_ratio: 1.5           # 전일 거래량 +50% 이상
  min_atr_pct: 0.06                 # ADR-010: ATR(14) / 종가 6% 이상 (3% → 6%)

# --- 브로커 연결 (키움 REST API) ---
broker:
  base_url: "https://api.kiwoom.com"
  ws_url: "wss://api.kiwoom.com:10000/api/dostk/websocket"
  rate_limit_calls: 5               # 초당 최대 API 호출 수
  rate_limit_period: 1.0            # Rate Limit 윈도우 (초)

# --- 백테스트 비용 모델 ---
backtest:
  commission: 0.00015               # 수수료 0.015% (매수/매도 각각)
  tax: 0.0015                       # 거래세 0.15% (2024 정책)
  slippage: 0.0003                  # 슬리피지 0.03% (추정값)
  initial_capital: 1_000_000        # (dead: 참조 코드 없음, ADR-013 baseline 비교용 상수)

# --- 알림 정책 (Phase 3-B / ADR-008) ---
notifications:
  daily_reset: true
  ohlcv_refresh: true
  token_refresh_failure: true
  trade_execution: true
  daily_report: true
  system_start: true
  system_stop: true
  uptime_sanity: true
  universe_refresh: true
  candle_collection: true
  ws_critical_failure: true
  ws_auto_recovery: true

# --- 스케줄러 ---
schedule:
  screening_time: "08:30"           # 장전 스크리닝
  ws_connect_time: "08:50"          # WebSocket 연결
  force_close_time: "15:10"         # 강제 청산
  daily_report_time: "15:30"        # 일일 보고서
