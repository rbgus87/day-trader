# ============================================================================
# config.yaml — 단타 자동매매 시스템 설정
# ============================================================================
# 민감 정보(API키, 계좌번호 등)는 .env 파일에서 관리합니다.
# 이 파일은 git에 커밋되므로 비밀번호/토큰을 절대 포함하지 마세요.
# 최신 baseline 및 동작 상세: docs/spec/backtester_behavior.md 참조.

# --- 모드 ---
paper_mode: true                    # true=주문 시뮬레이션(페이퍼), false=실매매(라이브)

# --- 매매 기본 설정 ---
trading:
  initial_capital: 5_000_000       # 페이퍼 자본 (시뮬 결과: 수익률 86.5%, PF 3.24)

  # 리스크
  daily_max_loss_pct: -0.015        # Phase 3 Day 11.5: -2% → -1.5% 강화
  consecutive_loss_days: 3          # N일 연속 손실 시 포지션 축소
  reduced_position_pct: 0.5         # 연속 손실 시 포지션 50%로 축소

  # Phase 2 Day 10: 약세장 방어
  daily_max_loss_enabled: true
  blacklist_enabled: true
  blacklist_lookback_days: 5        # 최근 5일 집계
  blacklist_loss_threshold: 3       # 5일 내 3회 이상 손실 시 블랙
  blacklist_days: 7                 # 7일간 매매 제외

  # Phase 3 Day 11.5: 방어 레벨 A — 연속 손실 휴식
  # 페이퍼 단계 비활성화: 이전 손실은 버그(5분봉 혼입/WS 미구독/시장필터 오판) 산물,
  # 현재 수정된 코드 검증과 무관하여 평가 자체를 차단할 이유가 없음.
  consecutive_loss_rest_enabled: false
  consecutive_loss_threshold: 3     # 3일 연속 손실 시
  consecutive_loss_rest_days: 1     # 1일 휴식

  # 진입 (멀티 종목 모델)
  entry_1st_ratio: 1.0              # 100% 1차 매수 (2차 매수 미구현, ADR-010)
  max_trades_per_day: 2             # 종목당 1회
  max_positions: 3                  # 동시 포지션 최대 3개
  screening_top_n: 5                # dead: UI 알림 범위 제한용, 진입 게이팅에 영향 X
  cooldown_minutes: 120             # 사실상 재진입 금지

  # 시간
  signal_block_until: "09:05"       # 09:05 이전 신호 차단 (장 초반 변동성 회피)
  force_close_time: "15:10"         # 15:10 미청산 포지션 강제 청산
  screening_time: "08:30"           # 08:30 장 전 스크리닝
  report_time: "15:30"              # 15:30 일일 보고서 텔레그램 발송

  # 시장 필터 (Phase 1 Day 3) — 코스피/코스닥 지수 MA 기반 매수 차단
  market_filter_enabled: true       # true면 약세 시장 종목 매수 차단
  market_ma_length: 5               # MA 기간 (일)

  # 장중 시장 필터 — 당일 지수 시가 대비 등락률 기반 (MA5와 독립 레이어)
  intraday_market_filter_enabled: true
  intraday_check_interval_min: 10       # 10분마다 체크
  intraday_block_threshold: -0.01       # 당일 -1% 이하 → 신규 매수 차단
  intraday_resume_threshold: -0.005     # -0.5% 이상 회복 → 매수 재개

  # VI(변동성완화장치) 휴리스틱 — 시장가 → 최유리지정가 자동 전환용
  # vi_static_pct: 전일종가 대비 |change_pct| ≥ 9.5% → STATIC_VI 추정 (보수적)
  # vi_assumed_duration_sec: 단일가 매매 2분 + 랜덤종료 30초
  # vi_suspected_duration_sec: REST 주문 거부(rt_cd≠"0") 기반 SUSPECTED 만료
  vi_static_pct: 0.095
  vi_assumed_duration_sec: 150
  vi_suspected_duration_sec: 60

  # 주문 체결 확인 파이프라인 (real_mode 전용; paper_mode는 무시)
  # order_confirmation_timeout_sec: WS '00' 체결통보 미수신 시 REST 폴백 시각
  # order_timeout_consecutive_threshold: 같은 ticker 연속 TIMEOUT 임계 (긴급 알림 발사)
  order_confirmation_timeout_sec: 10.0
  order_timeout_consecutive_threshold: 3

# --- 전략 파라미터 ---
strategy:
  force: "momentum"                     # 비어있으면 selector 로직, 값 있으면 해당 전략 강제

  # 모멘텀 브레이크아웃 — 전일 고점 돌파 + 거래량 200%
  momentum:
    volume_ratio: 2.0               # 전일 대비 거래량 200%
    min_breakout_pct: 0.03          # ADR-016: 전일 고가 대비 최소 돌파폭 3% (미세 돌파 노이즈 제거)
    adx_enabled: true               # ADX 추세 필터
    adx_length: 14                  # ADX 계산 기간
    adx_min: 20                     # ADX 최소값
    rvol_enabled: false
    rvol_window: 5
    rvol_min: 3.0
    vwap_enabled: false
    vwap_min_above: 0.0

    # 오전 매수 제한 (오후 진입 차단)
    buy_time_limit_enabled: true
    buy_time_end: "12:00"

    # ATR 비례 손절 (2026-05-13 그리드 확정: mult=2.0, min=4%, max=15%)
    # stop_pct = clamp(ATR × mult, min_pct, max_pct). fallback: stop_loss_pct -8%
    atr_stop_enabled: true
    atr_stop_multiplier: 2.0          # ATR × 2.0 (PF 4.881, SL# 27)
    atr_stop_min_pct: 0.04            # 최소 손절폭 4%
    atr_stop_max_pct: 0.15            # 최대 손절폭 15%
    stop_loss_pct: -0.080             # ATR 미가용 시 fallback

    # ADR-010: TP1 시스템 폐기 (Pure trailing 채택)
    # TP1 분할매도 비활성 — 진입 즉시 trailing 활성
    atr_tp_enabled: false

    # ADR-010: Chandelier 트레일링 스톱 (진입 즉시 활성)
    atr_trail_enabled: true         # 최고가 - ATR × N 방식
    atr_trail_multiplier: 1.0       # ADR-010: 2.5 → 1.0 (시뮬 최적)
    atr_trail_min_pct: 0.025        # 하한 2.5% (0.02 → 0.025, 2026-05-13 그리드)
    atr_trail_max_pct: 0.08         # 상한 8% (0.10 → 0.08, 2026-05-13 그리드)

    # ADR-017: Breakeven Stop (BE3) — ATR 비례 trigger/stop
    # trigger = max(breakeven_trigger_pct, ATR × be3_atr_ratio)
    # stop    = entry × (1 + ATR × be3_stop_atr_ratio)  (ATR 미가용 시 breakeven_offset_pct)
    breakeven_enabled: true         # 활성화
    breakeven_trigger_pct: 0.03     # 최소 발동 threshold (ATR 미가용 fallback)
    breakeven_offset_pct: 0.01      # ATR 미가용 시 stop offset fallback
    be3_atr_ratio: 0.4              # trigger = max(0.03, ATR × 0.4)  → ATR 12% → 4.8%
    be3_stop_atr_ratio: 0.15        # stop = entry × (1 + ATR × 0.15) → ATR 12% → +1.8%

    # 상한가 즉시 청산 — current_price >= 상한가 도달 시 즉시 매도
    limit_up_exit_enabled: true     # 활성화
    limit_up_pct: 0.30              # 전일종가 × 1.30 (호가 절사)
    limit_up_stop_floor_pct: 0.99   # 매도 실패 시 stop = 상한가 × 0.99 상향

    # 시간연동 트레일링 — 장 후반 trail 폭 축소
    # 마지막 phase(15:00)는 force_close(15:10)까지 연장 적용
    time_decay_trailing_enabled: true
    time_decay_min_pct_floor: 0.01      # 절대 하한 1.0% (인트라데이 노이즈 방어)
    time_decay_phases:
      - until: "12:00"
        multiplier: 1.0
      - until: "13:30"
        multiplier: 0.7
      - until: "14:30"
        multiplier: 0.5
      - until: "15:00"
        multiplier: 0.3

    # 틱 레벨 돌파 감지: 돌파 시점 대비 진입 가격 상한 (+10% 초과 시 진입 차단)
    max_entry_above_breakout_pct: 0.10
    # 전일종가 대비 현재가 상한 (+10% 초과 시 진입 차단, 상한가 근처 무의미 진입 방지)
    max_entry_above_close_pct: 10

    # 횡보 포지션 조기 청산 — 보유 N분 후 수익률 < min_profit이면 청산
    stale_position_exit_enabled: false
    stale_position_check_minutes: 30
    stale_position_min_profit: 0.005

    # 오후 강화 조건부 매수 (12:00~14:00 강화 조건 허용, false면 12:00 이후 전면 차단)
    afternoon_entry_enabled: false
    afternoon_end: "14:00"
    afternoon_min_breakout_pct: 0.05
    afternoon_min_volume_ratio: 3.0
    afternoon_min_adx: 25.0

    # 변동성 기반 포지션 사이징 (ATR% 기반 리스크 균등화)
    # position_value = clamp(capital × risk_per_trade_pct / (atr_pct × multiplier),
    #                        capital × min_pct, capital × max_pct)
    volatility_sizing_enabled: false   # 그리드 검증 후 활성화
    risk_per_trade_pct: 0.01           # 계좌 1% 리스크
    sizing_atr_multiplier: 1.0         # ATR × 1.0 = 예상 손실폭
    sizing_min_pct: 0.15               # 최소 포지션: 자본의 15%
    sizing_max_pct: 0.50               # 최대 포지션: 자본의 50%

    # 호가(OBI) 필터 — 실시간 전용 (0D 미수신 시 필터 비적용)
    # obi_filter_enabled: true 시 매수세 부재 종목 진입 차단
    obi_filter_enabled: false         # 페이퍼 검증 후 활성화
    obi_min: 0.55                     # OBI >= 0.55 (매수 우위) 시에만 진입
    spread_max_pct: 0.005             # 스프레드 0.5% 이하에서만 진입
    ask_wall_block_enabled: false     # 현재가 근처 매도벽 감지 시 진입 차단

    # 시그널 스코어링 — 최소 조건 통과 후 품질 필터 (100점 만점)
    signal_scoring_enabled: false
    signal_min_score: 60
    score_weight_volume_ratio: 25.0
    score_weight_adx_strength: 25.0
    score_weight_breakout_pct: 20.0
    score_weight_close_position: 15.0
    score_weight_atr_normalized: 15.0

    # 갭업 기준가 조정 — NXT 소진 종목 자연 필터링
    gap_breakout_adjust_enabled: false
    gap_threshold_pct: 0.03

    # 모멘텀 둔화 청산 — 수익 포지션 + 보유 15분+ + ROC ≤ -0.5%
    momentum_fade_exit_enabled: true
    momentum_fade_lookback: 10           # 최근 10분봉
    momentum_fade_threshold: -0.008      # ROC 임계 (-0.8%)
    momentum_fade_min_hold_min: 15       # 진입 후 최소 15분 보유
    momentum_fade_min_profit: 0.03       # 현재 수익률 +3% 이상

  # 장중 조건검색 — 09:05~11:30 동적 유니버스 확장
  intraday_search:
    enabled: true
    condition_name: "intraday_leader"  # HTS 조건식 이름
    schedule:
      - "09:05"
      - "09:15"
      - "09:30"
      - "10:00"
      - "10:30"
      - "11:00"
      - "11:30"
    max_add_per_search: 10             # 1회 검색당 최대 추가 종목
    max_total_added: 30                # 장중 총 추가 한도

  # 활성 전략 ("momentum" | "orb")
  strategy_type: "orb"

  # ORB(Opening Range Breakout) 전략
  # 09:00~09:04 첫 5분 고/저가를 레인지로, 돌파 시 진입 (09:05~09:30)
  # 그리드 결과: sl=1.5/tp=3.0/dl=09:30/rvol=1.5 + MA5 → OLD PF 2.596 / NEW PF 3.643
  orb:
    enabled: true
    range_minutes: 5
    min_range_pct: 0.005      # 레인지 최소 0.5% (허위 돌파 방지)
    max_range_pct: 0.10       # 레인지 최대 10% (손절 과대 방지)
    breakout_buffer: 0.0      # range_size 대비 추가 여유 (0~0.1)
    entry_deadline: "09:30"   # 진입 마감 시각
    sl_ratio: 1.5             # 손절 = entry - range_size × 1.5
    tp_ratio: 3.0             # 익절 = entry + range_size × 3.0
    use_volume_filter: true   # 거래량 필터 활성
    rvol_min: 1.5             # 당일 누적 거래량 >= 전일 × rvol_min

  # 갭업 눌림목 전략 — 장 초반(09:00~09:20) 갭업 후 눌림 반등 포착
  # 모멘텀과 독립: 시간대 분리(갭 09:00~09:20, 모멘텀 09:30~), 슬롯 공유
  gap_pullback:
    enabled: false                  # 그리드 검증 후 활성화
    gap_min_pct: 0.02               # 갭업 최소: 시가 > 전일종가 × 1.02
    gap_max_pct: 0.08               # 갭업 최대: 8% 초과는 과열
    pullback_min_pct: 0.01          # 눌림 최소: 시가 대비 -1% 이상
    pullback_max_pct: 0.03          # 눌림 최대: -3% 초과는 약세
    entry_start: "09:00"
    entry_end: "09:20"
    force_close: "09:45"            # 45분 내 결판 — 강제 청산
    max_positions: 1                # 갭 전략 최대 슬롯 (global max_positions 3 중 1)
    volume_ratio: 1.5               # 전일 동시간대 거래량 × 1.5 이상
    atr_stop_mult: 0.5              # 손절: 눌림저점 - ATR × 0.5

  # VWAP 리버전 전략 — 09:30~14:00 평균회귀 (ORB와 시간대 비중복)
  # 그리드 검증 전 비활성. 백테스트 전용: python scripts/grid_vwap.py
  vwap_reversion:
    enabled: false               # 백테스트 전용, 실거래 영향 없음
    entry_deviation: -0.015      # VWAP 대비 진입 하락폭 (-1.5%)
    stop_loss_pct: 0.015         # 진입가 대비 고정 손절폭 (1.5%)
    tp_above_vwap: 0.003         # 익절 VWAP 초과폭 (+0.3%)
    entry_start: "09:30"         # 진입 허용 시작
    entry_end: "14:00"           # 진입 허용 종료
    min_volume: 50000            # 전일 최소 거래량 (주)
    max_daily_drop: -0.07        # 당일 허용 최대 등락률 (-7%)

  # 전략 선택기 임계값 (StrategySelector — 현재 항상 momentum)
  selector:
    momentum_etf_threshold: 2.0     # 섹터 ETF 등락 ≥ 2.0% → 모멘텀 전략

# --- 조건검색 (영웅문 저장 조건식 연동) ---
condition_search:
  enabled: true
  condition_name: "day_momentum"    # 영웅문에 저장된 조건식 이름
  max_watch_stocks: 50              # 전일 거래대금 상위 N종목만 채택 (WS 구독 여유 확보)

# --- 스크리닝 필터 ---
screener:
  min_market_cap: 120_000_000_000   # 시가총액 1,200억원 이상 (intraday_leader와 통일)
  min_avg_volume_amount: 10_000_000_000 # 일평균 거래대금 100억원 이상 (유동성 강화)
  volume_surge_ratio: 1.5           # 전일 거래량 +50% 이상
  min_atr_pct: 0.04                 # ATR(14) / 종가 4% 이상 (6% → 4%, 중변동성 포함)

# --- 브로커 연결 (키움 REST API) ---
broker:
  base_url: "https://api.kiwoom.com"
  ws_url: "wss://api.kiwoom.com:10000/api/dostk/websocket"
  rate_limit_calls: 5               # 초당 최대 API 호출 수
  rate_limit_period: 1.0            # Rate Limit 윈도우 (초)
  ws_record_enabled: true          # WS 메시지 녹화 (기본 비활성)
  ws_record_dir: logs/ws_replay     # 녹화 파일 저장 디렉토리

# --- 백테스트 비용 모델 ---
backtest:
  commission: 0.00015               # 수수료 0.015% (매수/매도 각각)
  # 거래세 — KOSPI: 증권거래세 0.05% + 농어촌특별세 0.15% = 0.20%
  #          KOSDAQ: 증권거래세 0.20% (농특세 없음) = 0.20%
  # 현재는 시장 합계가 동일(0.20%)이라 단일 값으로 충분.
  # TODO: 세율 차등 시 cost_model에 market 파라미터 추가 필요.
  tax: 0.0020                       # 거래세 0.20% (2025 기준, KOSPI/KOSDAQ 공통)
  slippage: 0.0003                  # 슬리피지 0.03% (추정값)
  initial_capital: 5_000_000        # (dead: 참조 코드 없음, ADR-013 baseline 비교용 상수)

# --- 알림 정책 (Phase 3-B / ADR-008) ---
notifications:
  daily_reset: true
  ohlcv_refresh: true
  token_refresh_failure: true
  trade_execution: true
  daily_report: true
  system_start: true
  system_stop: true
  uptime_sanity: true
  universe_refresh: true
  candle_collection: true
  ws_critical_failure: true
  ws_auto_recovery: true

# --- 스케줄러 ---
schedule:
  screening_time: "08:30"           # 장전 스크리닝
  ws_connect_time: "08:50"          # WebSocket 연결
  force_close_time: "15:10"         # 강제 청산
  daily_report_time: "15:30"        # 일일 보고서
